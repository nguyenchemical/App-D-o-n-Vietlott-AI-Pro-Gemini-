    <style>
        :root {

        /* App Layout Fix for Github Pages */
        .app-container {

        .status-bar {

            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .game-tabs {
            display: flex; overflow-x: auto;
            padding: 12px; gap: 8px;

            position: sticky; top: 0; z-index: 100;
        }
        .game-tabs::-webkit-scrollbar { display: none; }

        .tab-item {
            flex: 0 0 auto; padding: 8px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px; font-weight: 800; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;

        .tab-item.active { background: white; color: var(--vietlott-red); }

        .card-main {
            background: linear-gradient(145deg, #1e1e1e, #141414);
            margin: 15px; border-radius: 24px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .jackpot-val {

        }

        .meter-box {
            background: #252525; height: 12px; border-radius: 6px;
            margin: 15px 0; overflow: hidden;
        }
        .meter-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #ed1c24);
            transition: width 1.5s ease-out;

        .ball-area {
            display: flex; flex-wrap: wrap; justify-content: center;

        .ball-red { background: radial-gradient(circle at 35% 35%, #ff7e7e, #ed1c24); color: white; }
        .ball-gold { background: radial-gradient(circle at 35% 35%, #ffefba, #f1c40f); color: #000; }

        /* Nút dự đoán nằm trong Scroll Area để không bị mất */
        .btn-predict-wrap {
            padding: 0 15px 20px;

        .btn-main {

            font-size: 18px; text-transform: uppercase;

        .led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .led-active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }

        #splash {
            position: fixed; inset: 0; background: #ed1c24; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-2xl animate-bounce">
            <span class="text-red-600 font-black text-4xl">V</span>
        </div>
        <h1 class="mt-6 font-black text-xl tracking-widest">VIETLOTT AI PRO</h1>
    </div>

    <div class="app-container">

            <div id="clock" class="text-xs font-mono font-bold text-red-500">00:00:00</div>

        <div class="game-tabs">

            <div class="tab-item" onclick="setGame('max3dpro')">Max 3D Pro</div>
        </div>

        <div class="scroll-area">
            <div class="card-main">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest" id="g-name">Lotto 5/35</span>

                </div>

                <div class="text-center text-[10px] text-gray-500 font-bold mb-1 uppercase">Giá trị giải thưởng hiện tại</div>

                <div class="mt-6">
                    <div class="flex justify-between text-[10px] font-black mb-1">

                </div>

                    <div class="py-10 opacity-20 flex flex-col items-center">
                        <i class="fas fa-microchip text-4xl mb-2"></i>
                        <span class="text-[10px] font-bold">READY TO ANALYZE</span>
                    </div>
                </div>

            <div class="card-main mt-0 py-6">

                </div>
                <button class="btn-sub text-yellow-500" onclick="predict('birth')">

            <div class="btn-predict-wrap">

                    <i class="fas fa-robot mr-2"></i> Dự đoán AI Ngay
                </button>
                <button class="btn-sub opacity-50" onclick="copyShare()">
                    <i class="fas fa-share-alt mr-1"></i> Chia sẻ cho bạn bè
                </button>
            </div>
        </div>

    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        let currentGame = 'lotto';
        const aiMemory = { lotto: new Set(), power: new Set(), mega: new Set(), bingo: new Set(), max3dpro: new Set() };
        
        // CẬP NHẬT THEO ẢNH NGÀY 30/04/2026
        const db = {
            lotto: { name: 'Lotto 5/35', jackpot: 6306837500, size: 5, max: 35, cls: 'ball-red' },
            power: { name: 'Power 6/55', jackpot: 40419333300, size: 6, max: 55, cls: 'ball-gold' },
            mega: { name: 'Mega 6/45', jackpot: 15047545500, size: 6, max: 45, cls: 'ball-red' },
            bingo: { name: 'Bingo 18', jackpot: 1500000, size: 3, max: 6, cls: 'ball-gold' },
            max3dpro: { name: 'Max 3D Pro', jackpot: 2000000000, size: 2, max: 999, cls: 'ball-red' }
        };

        window.onload = () => {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
                // Tự động tăng jackpot giả lập thời gian thực
                db.lotto.jackpot += Math.floor(Math.random() * 500);
                db.power.jackpot += Math.floor(Math.random() * 2000);
                refreshJackpotDisplay();
            }, 1000);

            const d = document.getElementById('b-day'), m = document.getElementById('b-month'), y = document.getElementById('b-year');
            for(let i=1; i<=31; i++) d.innerHTML += `<option>${i}</option>`;
            for(let i=1; i<=12; i++) m.innerHTML += `<option>Tháng ${i}</option>`;
            for(let i=1960; i<=2026; i++) y.innerHTML += `<option>${i}</option>`;
            y.value = "1995";

            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
            }, 1500);
        };

        function setGame(id) {
            currentGame = id;
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.remove('active');
                if(t.innerText.toLowerCase().includes(id.replace('3d', ''))) t.classList.add('active');
            });
            document.getElementById('g-name').innerText = db[id].name;
            refreshJackpotDisplay();
            resetMeter();
            document.getElementById('ball-box').innerHTML = '<div class="py-10 opacity-20 flex flex-col items-center"><i class="fas fa-microchip text-4xl mb-2"></i><span class="text-[10px] font-bold uppercase tracking-widest">Hệ thống sẵn sàng</span></div>';
        }

        function refreshJackpotDisplay() {
            document.getElementById('g-jackpot').innerText = db[currentGame].jackpot.toLocaleString('vi-VN') + 'đ';
        }

        function resetMeter() {
            document.getElementById('m-bar').style.width = '0%';
            document.getElementById('m-percent').innerText = '0%';
            document.getElementById('ai-status').innerText = "Đang chờ phân tích...";
        }

        function predict(mode) {
            resetMeter();
            document.getElementById('ball-box').innerHTML = `<div class="flex flex-col items-center py-10"><i class="fas fa-sync fa-spin text-3xl mb-3 text-red-500"></i><span class="text-[10px] font-black animate-pulse uppercase">AI đang tính toán bộ số độc bản...</span></div>`;

            setTimeout(() => {
                const lucky = Math.floor(Math.random() * 20) + 75;
                document.getElementById('m-bar').style.width = lucky + '%';
                document.getElementById('m-percent').innerText = lucky + '%';
                document.getElementById('ai-status').innerText = "Phân tích hoàn tất: Bộ số có tỷ lệ xuất hiện cao.";

                const g = db[currentGame];
                let nums = [];
                // Vòng lặp chống trùng lặp tuyệt đối
                do {
                    nums = [];
                    while(nums.length < g.size) {
                        let n = Math.floor(Math.random() * g.max) + 1;
                        if(!nums.includes(n)) nums.push(n);
                    }
                    nums.sort((a,b) => a-b);
                } while (aiMemory[currentGame].has(nums.join('-')));

                aiMemory[currentGame].add(nums.join('-'));
                render(nums);
            }, 1000);
        }

        function render(list) {
            const box = document.getElementById('ball-box'); box.innerHTML = '';
            list.forEach((num, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `ball ${db[currentGame].cls}`;
                    b.innerText = (db[currentGame].max > 100) ? num.toString().padStart(3, '0') : num.toString().padStart(2, '0');
                    box.appendChild(b);
                    setTimeout(() => b.classList.add('pop'), 50);
                    const s = document.getElementById('snd-pop');
                    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                }, i * 120);
            });
        }

        function copyShare() {
            const text = "Dùng thử Vietlott AI Pro để dự đoán bộ số may mắn: https://" + window.location.hostname + window.location.pathname;
            const el = document.createElement('textarea'); el.value = text;
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert("Đã copy liên kết chia sẻ!");
        }
    </script>
</body>
</html>
