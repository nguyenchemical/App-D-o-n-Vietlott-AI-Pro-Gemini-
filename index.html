        .jackpot-banner {
            background: linear-gradient(90deg, #ffd700, #ff8c00);

            padding: 10px;

            from { transform: translateY(-15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .main-card {
            background: #1a1a1a;

        .jackpot-amount {
            font-size: 32px;
            font-weight: 900;
            color: var(--v-gold);
            text-align: center;
            margin: 8px 0 15px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        .meter-container {
            background: rgba(255,255,255,0.03);

        .progress-track {
            height: 10px; background: #222;

        .progress-thumb {
            height: 100%; width: 0%;

        }
        .ball.active { transform: scale(1); }
        .ball-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #ed1c24); color: white; }
        .ball-gold { background: radial-gradient(circle at 30% 30%, #fff176, #fbc02d); color: #331a00; }

        /* Action Buttons */
        .btn-predict {

            transition: all 0.1s;
        }
        .btn-predict:active { transform: translateY(3px); box-shadow: 0 3px 0 #6e0a0e; }

        .form-box {
            background: #111; border-radius: 20px; padding: 12px;
            border: 1px solid #222;
        }

        .dot-indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        
        #splash {
            position: fixed; inset: 0; background: var(--v-red); z-index: 1000;

        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-2xl">
            <span class="text-red-600 font-black text-4xl">V</span>

        <p class="text-white font-black mt-4 tracking-widest text-[10px] uppercase">Dữ liệu đã sẵn sàng</p>

    <div class="app-shell">
        <div class="status-bar">
            <div class="flex items-center">
                <div class="dot-indicator"></div>
                <span id="ai-mode" class="text-[9px] font-black text-gray-500 uppercase tracking-tight">AI CORE: DEEP ANALYSIS</span>
            </div>
            <div id="clock-display" class="text-[11px] font-mono font-bold text-red-500">00:00:00</div>

        <div class="tabs-container" id="game-tabs">
            <!-- Tabs render dynamic but styled for immediate visibility -->
        </div>

                    🚀 PHÁT HIỆN TÍN HIỆU JACKPOT: XÁC SUẤT CỰC CAO!
                </div>
                <div class="main-card">
                    <div class="flex justify-between items-start mb-2">

                        </div>

                    <div class="text-[10px] text-gray-500 font-bold text-center uppercase tracking-[0.2em] mt-4">Jackpot Hiện Tại</div>

                    <div class="meter-container">
                        <div class="flex justify-between items-center text-[10px] font-black mb-1">
                            <span class="text-gray-400 uppercase">Chỉ số Jackpot Meter</span>
                            <span id="percent-display" class="text-red-500 text-sm">0%</span>

                            <div id="bar-display" class="progress-thumb"></div>
                        </div>

                    </div>

                        <select id="day-select" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                        <select id="month-select" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                        <select id="year-select" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>

    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const GAME_DB = {
            lotto: { name: 'Lotto 5/35', jackpot: 6306837500, size: 5, max: 35, cls: 'ball-red', date: '30/04/2026' },
            power: { name: 'Power 6/55', jackpot: 40419333300, size: 6, max: 55, cls: 'ball-gold', date: '30/04/2026' },
            mega: { name: 'Mega 6/45', jackpot: 15047545500, size: 6, max: 45, cls: 'ball-red', date: '01/05/2026' },
            bingo: { name: 'Bingo 18', jackpot: 1500000, size: 3, max: 6, cls: 'ball-gold', date: 'Mỗi 10 phút' },
            max3dpro: { name: 'Max 3D Pro', jackpot: 2000000000, size: 2, max: 999, cls: 'ball-red', date: '30/04/2026' }
        };

        let currentId = 'lotto';

        window.onload = () => {
            renderGameTabs();
            renderSelects();
            
            setInterval(() => {
                document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('vi-VN');
            }, 1000);
            
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                changeGame('lotto');
            }, 600);
        };

        function renderGameTabs() {
            const tabs = document.getElementById('game-tabs');
            tabs.innerHTML = '';
            Object.keys(GAME_DB).forEach(key => {
                const b = document.createElement('div');
                b.className = `tab-btn ${key === currentId ? 'active' : ''}`;
                b.id = `tab-${key}`;
                b.innerText = GAME_DB[key].name;
                b.onclick = () => changeGame(key);
                tabs.appendChild(b);
            });
        }

        function renderSelects() {
            const d = document.getElementById('day-select'), m = document.getElementById('month-select'), y = document.getElementById('year-select');
            for(let i=1; i<=31; i++) d.innerHTML += `<option>${i}</option>`;
            for(let i=1; i<=12; i++) m.innerHTML += `<option>Tháng ${i}</option>`;
            for(let i=1960; i<=2026; i++) y.innerHTML += `<option>${i}</option>`;
            y.value = "1995";
        }

        function changeGame(id) {
            currentId = id;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${id}`);
            if(activeTab) activeTab.classList.add('active');

            const g = GAME_DB[id];
            document.getElementById('name-display').innerText = g.name;
            document.getElementById('jackpot-display').innerText = g.jackpot.toLocaleString('vi-VN') + 'đ';
            document.getElementById('date-display').innerText = "Kỳ tiếp: " + g.date;
            
            clearView();
        }

        function clearView() {
            document.getElementById('bar-display').style.width = '0%';
            document.getElementById('percent-display').innerText = '0%';
            // Băng rôn luôn ẩn khi chuyển game hoặc mới vào
            document.getElementById('banner-alert').style.display = 'none';
            document.getElementById('ball-box').innerHTML = '<div class="py-10 opacity-10 flex flex-col items-center w-full"><i class="fas fa-brain text-4xl mb-2"></i><span class="text-[9px] font-black uppercase tracking-[0.2em]">Ready to Predict</span></div>';
            document.getElementById('status-msg').innerText = "Hệ thống AI sẵn sàng phân tích...";
        }

        function runAI() {
            document.getElementById('status-msg').innerText = "Đang áp dụng thuật toán Monte Carlo...";
            document.getElementById('ball-box').innerHTML = '';
            document.getElementById('banner-alert').style.display = 'none';
            
            setTimeout(() => {
                // Logic xác suất: Các game chính có xác suất hiển thị banner cao hơn
                const isMain = ['mega', 'power', 'lotto'].includes(currentId);
                const score = isMain ? (Math.floor(Math.random() * 8) + 91) : (Math.floor(Math.random() * 20) + 70);
                
                document.getElementById('bar-display').style.width = score + '%';
                document.getElementById('percent-display').innerText = score + '%';

                // HIỂN THỊ BĂNG RÔN CHỈ SAU KHI PHÂN TÍCH (Nếu score >= 91)
                if(score >= 91) {
                    document.getElementById('banner-alert').style.display = 'block';
                }

                const g = GAME_DB[currentId];
                let results = [];
                while(results.length < g.size) {
                    let n = Math.floor(Math.random() * g.max) + 1;
                    if(!results.includes(n)) results.push(n);
                }
                results.sort((a,b) => a-b);
                
                drawBalls(results);
                document.getElementById('status-msg').innerText = "Phân tích hoàn tất! Hãy kiểm tra vận may.";
            }, 700);
        }

        function drawBalls(list) {
            const container = document.getElementById('ball-box');
            container.innerHTML = '';
            list.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `ball ${GAME_DB[currentId].cls}`;
                    b.innerText = (GAME_DB[currentId].max > 100) ? n.toString().padStart(3, '0') : n.toString().padStart(2, '0');
                    container.appendChild(b);
                    setTimeout(() => b.classList.add('active'), 50);
                    const s = document.getElementById('snd-pop');
                    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                }, i * 110);
            });
        }

        function copyResult() {
            const balls = document.querySelectorAll('.ball');
            if(balls.length === 0) return alert("Vui lòng nhấn Dự đoán AI trước!");
            const txt = Array.from(balls).map(b => b.innerText).join(' - ');
            const temp = document.createElement('textarea');
            temp.value = `Vietlott AI: ${GAME_DB[currentId].name} [${txt}] - Xác suất: ${document.getElementById('percent-display').innerText}`;
            document.body.appendChild(temp); temp.select();
            document.execCommand('copy'); document.body.removeChild(temp);
            alert("Đã sao chép bộ số may mắn!");
        }

        function shareApp() {
            alert("Chúc bạn và người thân gặp nhiều may mắn!");
        }
    </script>
</body>
</html>
