```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --v-red: #ed1c24;
            --v-gold: #ffd700;
            --v-dark: #0f0f0f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }

        /* Top Header */
        .status-bar {
            padding: env(safe-area-inset-top) 16px 4px;
            display: flex; justify-content: space-between; align-items: center;
            background: #000;
        }

        /* Tabs Section - Sửa lỗi hiển thị tên game */
        .tabs-container {
            background: var(--v-red);
            display: flex;
            overflow-x: auto;
            padding: 10px 8px;
            gap: 8px;
            scrollbar-width: none;
            z-index: 100;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 0 0 auto;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            color: #ffffff !important; /* Luôn ép màu trắng khi load */
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            transition: all 0.1s ease;
        }
        .tab-btn.active {
            background: #fff !important;
            color: var(--v-red) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Main Screen Layout */
        .main-content {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: hidden;
        }

        /* Jackpot Notification Banner */
        .jackpot-banner {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            color: #000;
            font-weight: 900;
            font-size: 11px;
            text-align: center;
            padding: 10px;
            border-radius: 14px 14px 0 0;
            display: none; /* Hiện khi đạt xác suất cao */
            animation: slideDown 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
            margin-bottom: -14px;
            z-index: 2;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .main-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .jackpot-amount {
            font-size: 32px;
            font-weight: 900;
            color: var(--v-gold);
            text-align: center;
            margin: 8px 0 15px;
            letter-spacing: -0.5px;
        }

        .meter-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-track {
            height: 10px; background: #222;
            border-radius: 5px; margin: 8px 0; overflow: hidden;
        }
        .progress-thumb {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #ed1c24);
            transition: width 1s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        /* Ball Container */
        .ball-area {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 12px; margin: 20px 0; min-height: 48px;
        }
        .ball {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 950; font-size: 20px; color: #000;
            background: radial-gradient(circle at 30% 30%, #fff, #bbb);
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .ball.active { transform: scale(1); }
        .ball-red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #ed1c24); color: white; }
        .ball-gold { background: radial-gradient(circle at 30% 30%, #fff176, #fbc02d); color: #331a00; }

        /* Action Buttons */
        .btn-predict {
            background: linear-gradient(180deg, #ed1c24 0%, #a30e14 100%);
            padding: 18px; border-radius: 20px;
            font-weight: 900; font-size: 18px;
            text-transform: uppercase; color: white;
            border: none; width: 100%;
            box-shadow: 0 6px 0 #6e0a0e;
            transition: all 0.1s;
        }
        .btn-predict:active { transform: translateY(3px); box-shadow: 0 3px 0 #6e0a0e; }

        .form-area {
            background: #111; border-radius: 20px; padding: 12px;
            border: 1px solid #222;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        
        #splash {
            position: fixed; inset: 0; background: var(--v-red); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-2xl">
            <span class="text-red-600 font-black text-4xl">V</span>
        </div>
        <p class="text-white font-black mt-4 tracking-widest text-[10px] uppercase">Tối ưu hóa khởi động...</p>
    </div>

    <div class="app-shell">
        <div class="status-bar">
            <div class="flex items-center">
                <div class="dot"></div>
                <span id="ai-status" class="text-[9px] font-black text-gray-500 uppercase tracking-tight">AI CORE: DEEP FOCUSED</span>
            </div>
            <div id="clock" class="text-[11px] font-mono font-bold text-red-500">00:00:00</div>
        </div>

        <div class="tabs-container" id="game-tabs">
            <!-- Tabs render immediately -->
        </div>

        <div class="main-content">
            <div>
                <div id="jackpot-alert" class="jackpot-banner">
                    🚀 PHÁT HIỆN TÍN HIỆU JACKPOT: XÁC SUẤT CỰC CAO!
                </div>
                <div class="main-card">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h2 id="view-name" class="font-black text-xl text-white">Lotto 5/35</h2>
                            <span id="view-date" class="text-[9px] font-bold text-red-500 uppercase">Kỳ tiếp: 30/04/2026</span>
                        </div>
                        <div class="bg-red-600/20 px-2 py-1 rounded border border-red-600/30">
                            <span class="text-[8px] font-black text-red-500 uppercase">AI PRO MODE</span>
                        </div>
                    </div>

                    <div class="text-[10px] text-gray-500 font-bold text-center uppercase tracking-[0.2em] mt-4">Jackpot Ước Tính</div>
                    <div class="jackpot-amount" id="view-jackpot">0đ</div>

                    <div class="meter-container">
                        <div class="flex justify-between items-center text-[10px] font-black mb-1">
                            <span class="text-gray-500 uppercase">AI Confidence Score</span>
                            <span id="view-percent" class="text-red-500 text-sm">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="view-bar" class="progress-thumb"></div>
                        </div>
                    </div>

                    <div class="ball-area" id="ball-box">
                        <!-- Balls -->
                    </div>
                    
                    <div id="msg-box" class="text-center text-[9px] text-gray-600 font-bold italic">Lõi AI đã sẵn sàng phân tích dữ liệu...</div>
                </div>
            </div>

            <div class="flex flex-col gap-3 pb-2">
                <div class="form-area">
                    <div class="text-[9px] font-black text-gray-600 mb-2 uppercase text-center tracking-widest">Dự đoán theo năm sinh</div>
                    <div class="flex gap-2">
                        <select id="sel-d" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                        <select id="sel-m" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                        <select id="sel-y" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                    </div>
                </div>

                <button class="btn-predict" onclick="runAnalysis()">
                    <i class="fas fa-microchip mr-2"></i> PHÂN TÍCH AI NGAY
                </button>
                
                <div class="flex gap-2">
                    <button class="flex-1 bg-zinc-900 py-3 rounded-xl text-[10px] font-black border border-zinc-800" onclick="copy()">
                        <i class="fas fa-copy mr-1"></i> SAO CHÉP
                    </button>
                    <button class="flex-1 bg-zinc-900 py-3 rounded-xl text-[10px] font-black border border-zinc-800" onclick="share()">
                        <i class="fas fa-share-alt mr-1"></i> CHIA SẺ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="click-snd" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const GAME_DATA = {
            lotto: { name: 'Lotto 5/35', jackpot: 6306837500, size: 5, max: 35, cls: 'ball-red', date: '30/04/2026' },
            power: { name: 'Power 6/55', jackpot: 40419333300, size: 6, max: 55, cls: 'ball-gold', date: '30/04/2026' },
            mega: { name: 'Mega 6/45', jackpot: 15047545500, size: 6, max: 45, cls: 'ball-red', date: '01/05/2026' },
            bingo: { name: 'Bingo 18', jackpot: 1500000, size: 3, max: 6, cls: 'ball-gold', date: 'Mỗi 10 phút' },
            max3dpro: { name: 'Max 3D Pro', jackpot: 2000000000, size: 2, max: 999, cls: 'ball-red', date: '30/04/2026' }
        };

        let currentKey = 'lotto';

        window.onload = () => {
            initTabs();
            initSelects();
            
            // Đồng hồ hệ thống
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
            }, 1000);
            
            // Splash nhanh
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                switchGame('lotto');
            }, 800);
        };

        function initTabs() {
            const container = document.getElementById('game-tabs');
            container.innerHTML = '';
            Object.keys(GAME_DATA).forEach(key => {
                const btn = document.createElement('div');
                btn.className = `tab-btn ${key === currentKey ? 'active' : ''}`;
                btn.id = `tab-${key}`;
                btn.innerText = GAME_DATA[key].name;
                btn.onclick = () => switchGame(key);
                container.appendChild(btn);
            });
        }

        function initSelects() {
            const d = document.getElementById('sel-d'), m = document.getElementById('sel-m'), y = document.getElementById('sel-y');
            for(let i=1; i<=31; i++) d.innerHTML += `<option>${i}</option>`;
            for(let i=1; i<=12; i++) m.innerHTML += `<option>Tháng ${i}</option>`;
            for(let i=1960; i<=2026; i++) y.innerHTML += `<option>${i}</option>`;
            y.value = "1995";
        }

        function switchGame(key) {
            currentKey = key;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${key}`).classList.add('active');

            const g = GAME_DATA[key];
            document.getElementById('view-name').innerText = g.name;
            document.getElementById('view-jackpot').innerText = g.jackpot.toLocaleString('vi-VN') + 'đ';
            document.getElementById('view-date').innerText = "Kỳ tiếp: " + g.date;
            
            resetUI();
        }

        function resetUI() {
            document.getElementById('view-bar').style.width = '0%';
            document.getElementById('view-percent').innerText = '0%';
            document.getElementById('jackpot-alert').style.display = 'none';
            document.getElementById('ball-box').innerHTML = '<div class="py-10 opacity-10 flex flex-col items-center w-full"><i class="fas fa-brain text-4xl mb-2"></i><span class="text-[9px] font-black uppercase tracking-[0.2em]">Ready for Analysis</span></div>';
            document.getElementById('msg-box').innerText = "AI đang chờ lệnh phân tích...";
        }

        function runAnalysis() {
            document.getElementById('msg-box').innerText = "Đang chạy mô phỏng 10.000 kỳ quay...";
            document.getElementById('ball-box').innerHTML = '';
            
            setTimeout(() => {
                const isBig = ['mega', 'power', 'lotto'].includes(currentKey);
                // Tạo xác suất cao cho các game chính
                const conf = isBig ? (Math.floor(Math.random() * 8) + 90) : (Math.floor(Math.random() * 20) + 70);
                
                document.getElementById('view-bar').style.width = conf + '%';
                document.getElementById('view-percent').innerText = conf + '%';

                // Hiển thị thông báo Jackpot nếu xác suất > 90% (Áp dụng cho cả Lotto)
                if(conf >= 90) {
                    document.getElementById('jackpot-alert').style.display = 'block';
                } else {
                    document.getElementById('jackpot-alert').style.display = 'none';
                }

                const g = GAME_DATA[currentKey];
                let nums = [];
                while(nums.length < g.size) {
                    let n = Math.floor(Math.random() * g.max) + 1;
                    if(!nums.includes(n)) nums.push(n);
                }
                nums.sort((a,b) => a-b);
                
                showBalls(nums);
                document.getElementById('msg-box').innerText = "Phân tích thành công! Chúc bạn may mắn.";
            }, 600);
        }

        function showBalls(list) {
            const container = document.getElementById('ball-box');
            container.innerHTML = '';
            list.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `ball ${GAME_DATA[currentKey].cls}`;
                    b.innerText = (GAME_DATA[currentKey].max > 100) ? n.toString().padStart(3, '0') : n.toString().padStart(2, '0');
                    container.appendChild(b);
                    setTimeout(() => b.classList.add('active'), 50);
                    const s = document.getElementById('click-snd');
                    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                }, i * 100);
            });
        }

        function copy() {
            const balls = document.querySelectorAll('.ball');
            if(balls.length === 0) return alert("Vui lòng nhấn Phân tích trước!");
            const txt = Array.from(balls).map(b => b.innerText).join(' - ');
            const t = document.createElement('textarea');
            t.value = `Vietlott AI: ${GAME_DATA[currentKey].name} [${txt}] - Xác suất: ${document.getElementById('view-percent').innerText}`;
            document.body.appendChild(t); t.select();
            document.execCommand('copy'); document.body.removeChild(t);
            alert("Đã sao chép bộ số!");
        }

        function share() {
            alert("Chia sẻ app Vietlott AI PRO với bạn bè!");
        }
    </script>
</body>
</html>
