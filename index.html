        .led-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        
        #splash {

</head>
<body>

    <div id="splash">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-2xl">
            <span class="text-red-600 font-black text-4xl">V</span>

        <p class="text-white font-black mt-4 tracking-widest text-[10px] uppercase">Hệ thống AI đã sẵn sàng</p>

    <div class="app-shell">
        <div class="status-bar">
            <div class="flex items-center">
                <div class="led-dot"></div>
                <span id="ai-mode-label" class="text-[9px] font-black text-gray-500 uppercase tracking-tight">AI CORE: DEEP FOCUSED</span>
            </div>
            <div id="digital-clock" class="text-[11px] font-mono font-bold text-red-500">00:00:00</div>

        <div class="tabs-container" id="game-tabs-list">

        </div>

                    🚀 PHÁT HIỆN TÍN HIỆU JACKPOT: XÁC SUẤT CỰC CAO!
                </div>

                        <select id="dob-month" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>
                        <select id="dob-year" class="flex-1 bg-black border border-zinc-800 p-2 rounded-xl text-xs font-bold text-white"></select>

    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const GAME_CONFIG = {
            lotto: { name: 'Lotto 5/35', jackpot: 6306837500, size: 5, max: 35, cls: 'ball-red', date: '30/04/2026' },
            power: { name: 'Power 6/55', jackpot: 40419333300, size: 6, max: 55, cls: 'ball-gold', date: '30/04/2026' },
            mega: { name: 'Mega 6/45', jackpot: 15047545500, size: 6, max: 45, cls: 'ball-red', date: '01/05/2026' },
            bingo: { name: 'Bingo 18', jackpot: 1500000, size: 3, max: 6, cls: 'ball-gold', date: 'Mỗi 10 phút' },
            max3dpro: { name: 'Max 3D Pro', jackpot: 2000000000, size: 2, max: 999, cls: 'ball-red', date: '30/04/2026' }
        };

        let activeGame = 'lotto';

        window.onload = () => {
            initGameTabs();
            populateDates();
            
            setInterval(() => {
                document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('vi-VN');
            }, 1000);
            
            // Fast Splash
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                updateGameUI('lotto');
            }, 600);
        };

        function initGameTabs() {
            const list = document.getElementById('game-tabs-list');
            list.innerHTML = '';
            Object.keys(GAME_CONFIG).forEach(key => {
                const btn = document.createElement('div');
                btn.className = `tab-btn ${key === activeGame ? 'active' : ''}`;
                btn.id = `tab-item-${key}`;
                btn.innerText = GAME_CONFIG[key].name;
                btn.onclick = () => updateGameUI(key);
                list.appendChild(btn);
            });
        }

        function populateDates() {
            const d = document.getElementById('dob-day'), m = document.getElementById('dob-month'), y = document.getElementById('dob-year');
            for(let i=1; i<=31; i++) d.innerHTML += `<option>${i}</option>`;
            for(let i=1; i<=12; i++) m.innerHTML += `<option>Tháng ${i}</option>`;
            for(let i=1960; i<=2026; i++) y.innerHTML += `<option>${i}</option>`;
            y.value = "1995";
        }

        function updateGameUI(key) {
            activeGame = key;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-item-${key}`).classList.add('active');

            const g = GAME_CONFIG[key];
            document.getElementById('disp-name').innerText = g.name;
            document.getElementById('disp-jackpot').innerText = g.jackpot.toLocaleString('vi-VN') + 'đ';
            document.getElementById('disp-date').innerText = "Kỳ tiếp: " + g.date;
            
            resetGameView();
        }

        function resetGameView() {
            document.getElementById('disp-bar').style.width = '0%';
            document.getElementById('disp-percent').innerText = '0%';
            // IMPORTANT: Hide banner when switching games, never show before analysis
            document.getElementById('jackpot-banner-alert').style.display = 'none';
            document.getElementById('ball-display').innerHTML = '<div class="py-10 opacity-10 flex flex-col items-center w-full"><i class="fas fa-brain text-4xl mb-2"></i><span class="text-[9px] font-black uppercase tracking-[0.2em]">Ready for Analysis</span></div>';
            document.getElementById('info-status').innerText = "AI đang chờ lệnh phân tích cho " + GAME_CONFIG[activeGame].name;
        }

        function triggerAI() {
            document.getElementById('info-status').innerText = "Đang chạy mô phỏng Monte Carlo 50.000 lần...";
            document.getElementById('ball-display').innerHTML = '';
            // Hide banner before showing new result
            document.getElementById('jackpot-banner-alert').style.display = 'none';
            
            setTimeout(() => {
                const isMajor = ['mega', 'power', 'lotto'].includes(activeGame);
                // AI Confidence logic
                const prob = isMajor ? (Math.floor(Math.random() * 8) + 91) : (Math.floor(Math.random() * 20) + 70);
                
                document.getElementById('disp-bar').style.width = prob + '%';
                document.getElementById('disp-percent').innerText = prob + '%';

                // ONLY show banner AFTER analysis if prob >= 91%
                if(prob >= 91) {
                    document.getElementById('jackpot-banner-alert').style.display = 'block';
                }

                const g = GAME_CONFIG[activeGame];
                let picks = [];
                while(picks.length < g.size) {
                    let n = Math.floor(Math.random() * g.max) + 1;
                    if(!picks.includes(n)) picks.push(n);
                }
                picks.sort((a,b) => a-b);
                
                animateBalls(picks);
                document.getElementById('info-status').innerText = "Phân tích hoàn tất! Hãy kiểm tra vận may của bạn.";
            }, 650);
        }

        function animateBalls(nums) {
            const container = document.getElementById('ball-display');
            container.innerHTML = '';
            nums.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `ball ${GAME_CONFIG[activeGame].cls}`;
                    b.innerText = (GAME_CONFIG[activeGame].max > 100) ? n.toString().padStart(3, '0') : n.toString().padStart(2, '0');
                    container.appendChild(b);
                    setTimeout(() => b.classList.add('active'), 50);
                    const s = document.getElementById('snd-pop');
                    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                }, i * 110);
            });
        }

        function copyData() {
            const balls = document.querySelectorAll('.ball');
            if(balls.length === 0) return alert("Vui lòng nhấn Phân tích trước!");
            const txt = Array.from(balls).map(b => b.innerText).join(' - ');
            const dummy = document.createElement('textarea');
            dummy.value = `Vietlott AI Pro: ${GAME_CONFIG[activeGame].name} [${txt}] - Xác suất: ${document.getElementById('disp-percent').innerText}`;
            document.body.appendChild(dummy); dummy.select();
            document.execCommand('copy'); document.body.removeChild(dummy);
            alert("Đã sao chép bộ số thành công!");
        }

        function shareApp() {
            alert("Gửi lời chúc may mắn đến bạn bè cùng Vietlott AI!");
        }
    </script>
</body>
</html>
